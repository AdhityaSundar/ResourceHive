<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ResourceHive Icon Generator</title>
  <style>
    body { font-family: sans-serif; background: #1A2035; color: white; padding: 40px; text-align: center; }
    button {
      background: #F5A623; color: #1A2035;
      border: none; padding: 14px 28px; border-radius: 100px;
      font-size: 1rem; font-weight: 700; cursor: pointer; margin: 10px;
    }
    canvas { display: none; }
    p { color: rgba(255,255,255,0.6); margin-top: 20px; font-size: 0.9rem; }
  </style>
</head>
<body>
  <h2>🐝 ResourceHive Icon Generator</h2>
  <p>Click the buttons below to download your app icons.<br>Save both files into your <strong>resourcehive/</strong> folder.</p>
  <br>
  <button onclick="generateIcon(192)">Download icon-192.png</button>
  <button onclick="generateIcon(512)">Download icon-512.png</button>
  <canvas id="c"></canvas>

  <script>
    function generateIcon(size) {
      const canvas = document.getElementById('c');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      const s = size;
      const cx = s / 2, cy = s / 2;

      // Background
      ctx.fillStyle = '#1A2035';
      ctx.fillRect(0, 0, s, s);

      // Rounded background circle
      ctx.beginPath();
      ctx.arc(cx, cy, s * 0.46, 0, Math.PI * 2);
      ctx.fillStyle = '#1e2740';
      ctx.fill();

      // Draw outer hexagon
      function hex(cx, cy, r, fill, stroke, sw) {
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
          const a = Math.PI / 180 * (60 * i - 30);
          const x = cx + r * Math.cos(a);
          const y = cy + r * Math.sin(a);
          i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.fillStyle = fill;
        ctx.fill();
        if (stroke) {
          ctx.strokeStyle = stroke;
          ctx.lineWidth = sw;
          ctx.stroke();
        }
      }

      const R = s * 0.42;
      hex(cx, cy, R, '#1e2740', '#F5A623', s * 0.018);

      // Inner honeycomb cells
      const cr = R * 0.36;
      const offset = cr * 0.95;

      // Top cell
      ctx.globalAlpha = 0.95;
      hex(cx, cy - offset * 0.95, cr, '#F5A623', null, 0);

      // Bottom-left cell
      ctx.globalAlpha = 0.65;
      hex(cx - offset * 0.82, cy + offset * 0.48, cr, '#F5A623', null, 0);

      // Bottom-right cell
      hex(cx + offset * 0.82, cy + offset * 0.48, cr, '#F5A623', null, 0);

      // Bottom center cell (darker)
      ctx.globalAlpha = 0.45;
      hex(cx, cy + offset * 0.95, cr * 0.85, '#E8850A', null, 0);

      ctx.globalAlpha = 1;

      // Center dot on top cell
      ctx.beginPath();
      ctx.arc(cx, cy - offset * 0.95, cr * 0.25, 0, Math.PI * 2);
      ctx.fillStyle = '#1A2035';
      ctx.fill();

      ctx.beginPath();
      ctx.arc(cx, cy - offset * 0.95, cr * 0.12, 0, Math.PI * 2);
      ctx.fillStyle = '#F5A623';
      ctx.fill();

      // People dots in lower cells
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      [
        [cx - offset * 0.82, cy + offset * 0.48],
        [cx + offset * 0.82, cy + offset * 0.48],
        [cx, cy + offset * 0.95]
      ].forEach(([px, py]) => {
        ctx.beginPath();
        ctx.arc(px, py, cr * 0.12, 0, Math.PI * 2);
        ctx.fill();
      });

      // Download
      const link = document.createElement('a');
      link.download = `icon-${size}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }
  </script>
</body>
</html>
